name = "thirdpartyrisk"
main = "src/index.js"
compatibility_date = "2025-09-06"

# wrangler.toml (wrangler v3.88.0^)
[observability.logs]
enabled = true

# Daily scheduled ingestion at 2 AM UTC.
[triggers]
crons = ["0 2 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "tprisk"
database_id = "0aae51e4-fca2-4f5a-8dd2-2f9ea7b50e67"

# Required secret for live UpGuard ingestion:
# - UPGUARD_API_KEY (set with `wrangler secret put UPGUARD_API_KEY`)
[vars]
REQUIRE_ACCESS = "0"
UPGUARD_PORTFOLIO_ID = ""

[env.staging]
# Keep same entry file; secrets are environment-specific.
[env.staging.vars]
REQUIRE_ACCESS = "0"
UPGUARD_PORTFOLIO_ID = ""

[[env.staging.d1_databases]]
binding = "DB"
database_name = "tprisk"
database_id = "0aae51e4-fca2-4f5a-8dd2-2f9ea7b50e67"

[env.production]
[env.production.vars]
REQUIRE_ACCESS = "0"
UPGUARD_PORTFOLIO_ID = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "tprisk"
database_id = "0aae51e4-fca2-4f5a-8dd2-2f9ea7b50e67"
